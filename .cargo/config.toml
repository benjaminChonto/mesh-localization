[target.riscv32imc-unknown-none-elf]
runner = "rustmeter run --chip esp32c3"

# Firmware-only flags (not applied to the host-target mesh-ui build).
rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C",
  "force-frame-pointers",
  # Required by defmt: interns log strings into a custom linker section.
  "-C",
  "link-arg=-Tdefmt.x",
  # Required by rustmeter-beacon: keeps the .rustmeter_fn_metadata / .rustmeter_data
  # sections that the rustmeter CLI reads back out of the ELF.
  "-C",
  "link-arg=-Trustmeter.x",
]

[env]
DEFMT_LOG = "info"

[alias]
build-firmware = "build -p esp32-firmware --target riscv32imc-unknown-none-elf --release"
run-firmware = "run -p esp32-firmware --target riscv32imc-unknown-none-elf --release"
build-ui = "build -p mesh-ui"
run-ui = "run -p mesh-ui"

# target = "riscv32imc-unknown-none-elf"

