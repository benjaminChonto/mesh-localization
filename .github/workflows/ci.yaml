name: Rust CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Rust target
        run: rustup target add riscv32imc-unknown-none-elf

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Firmware
        run: cargo build-firmware --verbose

      - name: Build UI
        run: cargo build-ui --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: 
          cargo clippy -p esp32-firmware --target riscv32imc-unknown-none-elf --all-features -- -W clippy::all -W clippy::pedantic
          cargo clippy -p mesh-ui --all-features -- -W clippy::all -W clippy::pedantic
